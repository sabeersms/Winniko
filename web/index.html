<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Predict scores, challenge friends, and win with Winniko.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Winniko">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Winniko</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>
  <style>
    body {
      background-color: #0A0F0D;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
      font-family: sans-serif;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #00FFC2;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>Loading Winniko...</div>
  </div>

  <script>
    self.FIREBASE_APPCHECK_DEBUG_TOKEN = true;

    // Force HTML renderer for mobile browsers to avoid CanvasKit issues on iOS
    window.flutterWebRenderer = "html";

    // PWA Install Prompt Capture
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      console.log('Capture event: beforeinstallprompt');
    });

    // Function for Flutter to call
    function showInstallPrompt() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('User accepted the install prompt');
          } else {
            console.log('User dismissed the install prompt');
          }
          deferredPrompt = null;
        });
        return true;
      }
      return false;
    }

    function isInstallPromptAvailable() {
      return !!deferredPrompt;
    }

    // Hide loading when app starts
    window.addEventListener('load', function(ev) {
      // The app might take a few more seconds to actually render
      // We rely on the bootstrap or main.dart to signal readiness if needed
      // But for now, we'll let Flutter overwrite the body or we can hide it manually
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
